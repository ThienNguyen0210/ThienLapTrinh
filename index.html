<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gửi Văn Bản Qua Email</title>
    <script src="https://cdn.emailjs.com/dist/email.min.js"></script>
    <script>
        (function() {
            emailjs.init("ThienNguyen"); // Thay YOUR_USER_ID bằng User ID của bạn
        })();

        function sendEmail() {
            const message = document.getElementById('message').value;
            const templateParams = {
                message: message,
            };

            emailjs.send('service_7y26eqp', 'template_mcvqowq', templateParams)
                .then((response) => {
                    console.log('Email sent successfully!', response.status, response.text);
                    alert('Email đã được gửi thành công!');
                }, (error) => {
                    console.error('Failed to send email.', error);
                    alert('Gửi email không thành công.');
                });
        }
    </script>
</head>
<body>
    <h1>Gửi Văn Bản Qua Email</h1>
    <textarea id="message" rows="4" cols="50" placeholder="Nhập văn bản ở đây..."></textarea><br>
    <button onclick="sendEmail()">Gửi</button>
</body>
</html>
